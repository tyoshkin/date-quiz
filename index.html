<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Приветики, Юля 🐾</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fdf0f5;
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ─── Floating paws background ─── */
    .paws {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .paw {
      position: absolute;
      opacity: 0;
      animation: pawFloat linear infinite;
    }
    @keyframes pawFloat {
      0%   { opacity: 0; transform: translateY(100vh) rotate(0deg); }
      10%  { opacity: 0.18; }
      90%  { opacity: 0.07; }
      100% { opacity: 0; transform: translateY(-20vh) rotate(30deg); }
    }

    /* ─── Screens ─── */
    .screen {
      display: none;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 24px;
      animation: popIn 0.45s cubic-bezier(.34,1.56,.64,1);
    }
    .screen.active { display: flex; flex-direction: column; align-items: center; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card {
      background: #fff;
      border-radius: 28px;
      padding: 40px 32px 90px; /* extra bottom padding for running dog */
      box-shadow: 0 8px 40px rgba(220, 80, 130, 0.12);
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* ─── Screen 1 ─── */
    .s1-emoji { font-size: 3.5rem; margin-bottom: 20px; display: block; }
    .s1-text {
      font-size: 1.35rem;
      font-weight: 700;
      color: #2d2d2d;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .s1-sub {
      font-size: 0.95rem;
      color: #b07090;
      margin-bottom: 16px;
    }

    /* ─── Running dog ─── */
    .dog-runway {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      pointer-events: none;
    }

    .dog-runner {
      position: absolute;
      bottom: 12px;
      left: 0;
      width: 130px;
      animation: runLeftRight 4s linear infinite;
      cursor: pointer;
      pointer-events: all;
    }
    .dog-runner:hover { filter: drop-shadow(0 0 6px #e91e8c88); }

    @keyframes runLeftRight {
      0%         { left: 10px;           transform: scaleX(1); }
      /* arriving right */
      47%        { left: calc(100% - 140px); transform: scaleX(1); }
      /* pause & flip */
      50%        { left: calc(100% - 140px); transform: scaleX(-1); }
      /* arriving left */
      97%        { left: 10px;           transform: scaleX(-1); }
      100%       { left: 10px;           transform: scaleX(1); }
    }

    /* leg animation */
    .leg { transform-origin: top center; }
    .leg-fl { animation: legSwing 0.28s ease-in-out infinite alternate; }
    .leg-bl { animation: legSwing 0.28s ease-in-out infinite alternate-reverse; }
    .leg-fr { animation: legSwing 0.28s ease-in-out infinite alternate-reverse; }
    .leg-br { animation: legSwing 0.28s ease-in-out infinite alternate; }
    @keyframes legSwing {
      from { transform: rotate(-22deg); }
      to   { transform: rotate(22deg); }
    }
    /* tail wag */
    .tail { transform-origin: right center; animation: tailWag 0.4s ease-in-out infinite alternate; }
    @keyframes tailWag {
      from { transform: rotate(-25deg); }
      to   { transform: rotate(15deg); }
    }
    /* ear bounce */
    .ear { transform-origin: top center; animation: earFlop 0.55s ease-in-out infinite alternate; }
    @keyframes earFlop {
      from { transform: rotate(-5deg); }
      to   { transform: rotate(8deg); }
    }

    .dog-tap-hint {
      position: absolute;
      bottom: 6px;
      width: 100%;
      text-align: center;
      font-size: 0.75rem;
      color: #ddb0c8;
      font-weight: 600;
      pointer-events: none;
    }

    /* ─── Screen 2 ─── */
    .s2-question {
      font-size: 1.6rem;
      font-weight: 800;
      color: #2d2d2d;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .s2-sub {
      font-size: 0.9rem;
      color: #c47090;
      margin-bottom: 32px;
    }
    .answer-btns {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }
    .answer-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 18px;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .btn-yes {
      background: linear-gradient(135deg, #f875aa, #e91e8c);
      color: #fff;
      box-shadow: 0 6px 20px rgba(233,30,140,0.35);
    }
    .btn-yes:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 28px rgba(233,30,140,0.45); }
    .btn-no {
      background: #f5f0f5;
      color: #999;
      border: 1.5px solid #eedde8;
    }
    .btn-no:hover { background: #eedde8; color: #c47090; }

    /* ─── Screen 3 YES ─── */
    .s3-photo {
      width: 100%;
      max-width: 300px;
      height: 300px;
      object-fit: cover;
      object-position: top;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .s3-yes-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #e91e8c;
      margin-bottom: 10px;
    }
    .s3-yes-sub {
      font-size: 1rem;
      color: #888;
      line-height: 1.6;
    }
    .confetti-btn {
      margin-top: 24px;
      background: linear-gradient(135deg, #f875aa, #e91e8c);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 32px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(233,30,140,0.3);
      transition: transform 0.18s;
    }
    .confetti-btn:hover { transform: scale(1.05); }

    /* ─── Screen 3 NO ─── */
    .s3-no-dog { font-size: 7rem; margin-bottom: 8px; display: block; animation: sadBob 2s ease-in-out infinite; }
    @keyframes sadBob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
    .s3-no-title { font-size: 1.4rem; font-weight: 800; color: #666; margin-bottom: 8px; }
    .s3-no-sub { font-size: 0.92rem; color: #aaa; line-height: 1.6; margin-bottom: 20px; }
    .retry-btn {
      background: #f5f0f5;
      color: #c47090;
      border: 1.5px solid #eedde8;
      border-radius: 50px;
      padding: 12px 28px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
    }
    .retry-btn:hover { background: #eedde8; transform: scale(1.03); }

    /* ─── Confetti ─── */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="paws" id="pawsBg"></div>

<!-- ══════════ SCREEN 1 ══════════ -->
<div class="screen active" id="s1">
  <div class="card">
    <span class="s1-emoji">🌸</span>
    <p class="s1-text">Приветики! Юля,<br>у меня для тебя вопрос</p>
    <p class="s1-sub">нажми на собачку 👇</p>

    <!-- Running dachshund along the bottom of card -->
    <div class="dog-runway">
      <div class="dog-runner" onclick="goTo('s2')" title="нажми!">
        <!-- viewBox wider so snout fits, dog faces RIGHT -->
        <svg viewBox="0 0 140 62" xmlns="http://www.w3.org/2000/svg" width="140" height="62">
          <!-- Shadow -->
          <ellipse cx="60" cy="57" rx="38" ry="4" fill="rgba(0,0,0,0.08)"/>

          <!-- TAIL (left side, curls up) -->
          <g class="tail" style="transform-origin:18px 32px">
            <path d="M18 32 Q4 24 7 12 Q9 5 16 10" stroke="#b5683a" stroke-width="6" stroke-linecap="round" fill="none"/>
          </g>

          <!-- BACK LEGS -->
          <g class="leg leg-bl" style="transform-origin:30px 42px">
            <rect x="26" y="42" width="9" height="15" rx="4.5" fill="#a05830"/>
            <ellipse cx="30" cy="57" rx="6" ry="3" fill="#8a4820"/>
          </g>
          <g class="leg leg-br" style="transform-origin:42px 42px">
            <rect x="38" y="42" width="9" height="14" rx="4.5" fill="#b06030"/>
            <ellipse cx="42" cy="56" rx="6" ry="3" fill="#8a4820"/>
          </g>

          <!-- BODY — very long, low, classic dachshund -->
          <ellipse cx="60" cy="36" rx="44" ry="16" fill="#c8844a"/>
          <!-- Belly lighter -->
          <ellipse cx="60" cy="43" rx="34" ry="9" fill="#dba472"/>

          <!-- FRONT LEGS -->
          <g class="leg leg-fl" style="transform-origin:80px 42px">
            <rect x="76" y="42" width="9" height="15" rx="4.5" fill="#a05830"/>
            <ellipse cx="80" cy="57" rx="6" ry="3" fill="#8a4820"/>
          </g>
          <g class="leg leg-fr" style="transform-origin:90px 42px">
            <rect x="86" y="42" width="9" height="14" rx="4.5" fill="#b06030"/>
            <ellipse cx="90" cy="56" rx="6" ry="3" fill="#8a4820"/>
          </g>

          <!-- NECK -->
          <ellipse cx="97" cy="30" rx="12" ry="12" fill="#c8844a"/>

          <!-- HEAD -->
          <ellipse cx="107" cy="21" rx="14" ry="12" fill="#c8844a"/>

          <!-- FLOPPY EAR -->
          <g class="ear" style="transform-origin:100px 20px">
            <ellipse cx="98" cy="30" rx="8" ry="13" fill="#9a5525" transform="rotate(-8 98 30)"/>
          </g>

          <!-- SNOUT (clearly sticking out forward) -->
          <ellipse cx="119" cy="26" rx="9" ry="6" fill="#b56535"/>
          <!-- Nose tip — black shiny -->
          <ellipse cx="127" cy="24" rx="4" ry="3" fill="#1e0e04"/>
          <!-- Nose shine -->
          <ellipse cx="126" cy="23" rx="1.2" ry="0.9" fill="#ffffff88"/>
          <!-- Mouth line -->
          <path d="M122 28 Q124 31 127 28" stroke="#8a4820" stroke-width="1.4" stroke-linecap="round" fill="none"/>

          <!-- EYE -->
          <circle cx="111" cy="17" r="4" fill="#fff"/>
          <circle cx="112" cy="17" r="2.5" fill="#1e0e04"/>
          <circle cx="113" cy="16" r="1" fill="#fff"/>
          <!-- Eyebrow -->
          <path d="M108 12 Q112 10 116 12" stroke="#9a5525" stroke-width="1.8" stroke-linecap="round" fill="none"/>

          <!-- COLLAR (pink with gold tag) -->
          <rect x="92" y="36" width="18" height="6" rx="3" fill="#e91e8c"/>
          <circle cx="101" cy="42" r="3" fill="#ffd700"/>
        </svg>
      </div>
      <div class="dog-tap-hint">🐾 нажми!</div>
    </div>
  </div>
</div>

<!-- ══════════ SCREEN 2 ══════════ -->
<div class="screen" id="s2">
  <div class="card" style="padding-bottom:40px">
    <p class="s2-question">Давай сходим<br>на свидание? 👉👈<br><span style="font-size:1rem;font-weight:600;color:#c47090">(прям официально 😳)</span></p>
    <p class="s2-sub">это очень важный вопрос, всё серьёзно!!</p>
    <div class="answer-btns">
      <button class="answer-btn btn-yes" onclick="goTo('s3yes')">🥰 Давай!</button>
      <button class="answer-btn btn-no"  onclick="goTo('s3no')">Нет(</button>
    </div>
  </div>
</div>

<!-- ══════════ SCREEN 3 — YES ══════════ -->
<div class="screen" id="s3yes">
  <div class="card" style="padding-bottom:40px">
    <img src="photo.jpg" class="s3-photo" alt="это я" onerror="this.style.display='none'" />
    <p class="s3-yes-title">Вадим доволен 😌</p>
    <p class="s3-yes-sub">я уже очень рад 🥹<br>скоро напишу, договоримся!</p>
    <button class="confetti-btn" onclick="boom()">🎊 Нажми ещё раз!</button>
  </div>
</div>

<!-- ══════════ SCREEN 3 — NO ══════════ -->
<div class="screen" id="s3no">
  <div class="card" style="padding-bottom:40px">
    <span class="s3-no-dog">🐶</span>
    <p class="s3-no-title">ну и ладно... 😔</p>
    <p class="s3-no-sub">пёсик расстроился.<br>я тоже немного.</p>
    <button class="retry-btn" onclick="goTo('s2')">← подумать ещё раз?</button>
  </div>
</div>

<script>
  // Floating paws
  const pawsBg = document.getElementById('pawsBg');
  const pawEmojis = ['🐾','🌸','💕','✨','🐾','🌷'];
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'paw';
    p.textContent = pawEmojis[Math.floor(Math.random() * pawEmojis.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (10 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 14) + 's';
    p.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    pawsBg.appendChild(p);
  }

  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 's3yes') setTimeout(boom, 300);
  }

  function boom() {
    const colors = ['#f875aa','#e91e8c','#ffd700','#ff6b9d','#fff','#c8845a'];
    for (let i = 0; i < 80; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = '-10px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.width = (6 + Math.random() * 8) + 'px';
      c.style.height = (6 + Math.random() * 8) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      c.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }
</script>
</body>
</html>
