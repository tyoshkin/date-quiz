<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Приветики, Юля 🐾</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fdf0f5;
      font-family: 'Nunito', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ─── Floating paws background ─── */
    .paws {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .paw {
      position: absolute;
      opacity: 0;
      animation: pawFloat linear infinite;
    }
    @keyframes pawFloat {
      0%   { opacity: 0; transform: translateY(100vh) rotate(0deg); }
      10%  { opacity: 0.18; }
      90%  { opacity: 0.07; }
      100% { opacity: 0; transform: translateY(-20vh) rotate(30deg); }
    }

    /* ─── Screens ─── */
    .screen {
      display: none;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 24px;
      animation: popIn 0.45s cubic-bezier(.34,1.56,.64,1);
    }
    .screen.active { display: flex; flex-direction: column; align-items: center; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card {
      background: #fff;
      border-radius: 28px;
      padding: 40px 32px 90px; /* extra bottom padding for running dog */
      box-shadow: 0 8px 40px rgba(220, 80, 130, 0.12);
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* ─── Screen 1 ─── */
    .s1-emoji { font-size: 3.5rem; margin-bottom: 20px; display: block; }
    .s1-text {
      font-size: 1.35rem;
      font-weight: 700;
      color: #2d2d2d;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    .s1-sub {
      font-size: 0.95rem;
      color: #b07090;
      margin-bottom: 16px;
    }

    /* ─── Running dog ─── */
    .dog-runway {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      pointer-events: none;
    }

    .dog-runner {
      position: absolute;
      bottom: 12px;
      left: 0;
      width: 100px;
      animation: runLeftRight 4s linear infinite;
      cursor: pointer;
      pointer-events: all;
    }
    .dog-runner:hover { filter: drop-shadow(0 0 6px #e91e8c88); }

    @keyframes runLeftRight {
      0%         { left: 10px;           transform: scaleX(1); }
      /* arriving right */
      47%        { left: calc(100% - 110px); transform: scaleX(1); }
      /* pause & flip */
      50%        { left: calc(100% - 110px); transform: scaleX(-1); }
      /* arriving left */
      97%        { left: 10px;           transform: scaleX(-1); }
      100%       { left: 10px;           transform: scaleX(1); }
    }

    /* leg animation */
    .leg { transform-origin: top center; }
    .leg-fl { animation: legSwing 0.28s ease-in-out infinite alternate; }
    .leg-bl { animation: legSwing 0.28s ease-in-out infinite alternate-reverse; }
    .leg-fr { animation: legSwing 0.28s ease-in-out infinite alternate-reverse; }
    .leg-br { animation: legSwing 0.28s ease-in-out infinite alternate; }
    @keyframes legSwing {
      from { transform: rotate(-22deg); }
      to   { transform: rotate(22deg); }
    }
    /* tail wag */
    .tail { transform-origin: right center; animation: tailWag 0.4s ease-in-out infinite alternate; }
    @keyframes tailWag {
      from { transform: rotate(-25deg); }
      to   { transform: rotate(15deg); }
    }
    /* ear bounce */
    .ear { transform-origin: top center; animation: earFlop 0.55s ease-in-out infinite alternate; }
    @keyframes earFlop {
      from { transform: rotate(-5deg); }
      to   { transform: rotate(8deg); }
    }

    .dog-tap-hint {
      position: absolute;
      bottom: 6px;
      width: 100%;
      text-align: center;
      font-size: 0.75rem;
      color: #ddb0c8;
      font-weight: 600;
      pointer-events: none;
    }

    /* ─── Screen 2 ─── */
    .s2-question {
      font-size: 1.6rem;
      font-weight: 800;
      color: #2d2d2d;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .s2-sub {
      font-size: 0.9rem;
      color: #c47090;
      margin-bottom: 32px;
    }
    .answer-btns {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }
    .answer-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 18px;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .btn-yes {
      background: linear-gradient(135deg, #f875aa, #e91e8c);
      color: #fff;
      box-shadow: 0 6px 20px rgba(233,30,140,0.35);
    }
    .btn-yes:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 28px rgba(233,30,140,0.45); }
    .btn-no {
      background: #f5f0f5;
      color: #999;
      border: 1.5px solid #eedde8;
    }
    .btn-no:hover { background: #eedde8; color: #c47090; }

    /* ─── Screen 3 YES ─── */
    .s3-photo {
      width: 100%;
      max-width: 300px;
      height: 300px;
      object-fit: cover;
      object-position: top;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .s3-yes-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #e91e8c;
      margin-bottom: 10px;
    }
    .s3-yes-sub {
      font-size: 1rem;
      color: #888;
      line-height: 1.6;
    }
    .confetti-btn {
      margin-top: 24px;
      background: linear-gradient(135deg, #f875aa, #e91e8c);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 32px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(233,30,140,0.3);
      transition: transform 0.18s;
    }
    .confetti-btn:hover { transform: scale(1.05); }

    /* ─── Screen 3 NO ─── */
    .s3-no-dog { font-size: 7rem; margin-bottom: 8px; display: block; animation: sadBob 2s ease-in-out infinite; }
    @keyframes sadBob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
    .s3-no-title { font-size: 1.4rem; font-weight: 800; color: #666; margin-bottom: 8px; }
    .s3-no-sub { font-size: 0.92rem; color: #aaa; line-height: 1.6; margin-bottom: 20px; }
    .retry-btn {
      background: #f5f0f5;
      color: #c47090;
      border: 1.5px solid #eedde8;
      border-radius: 50px;
      padding: 12px 28px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
    }
    .retry-btn:hover { background: #eedde8; transform: scale(1.03); }

    /* ─── Confetti ─── */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="paws" id="pawsBg"></div>

<!-- ══════════ SCREEN 1 ══════════ -->
<div class="screen active" id="s1">
  <div class="card">
    <span class="s1-emoji">🌸</span>
    <p class="s1-text">Приветики! Юля,<br>у меня для тебя вопрос</p>
    <p class="s1-sub">нажми на собачку 👇</p>

    <!-- Running dachshund along the bottom of card -->
    <div class="dog-runway">
      <div class="dog-runner" onclick="goTo('s2')" title="нажми!">
        <svg viewBox="0 0 100 55" xmlns="http://www.w3.org/2000/svg" width="100" height="55">
          <!-- Shadow -->
          <ellipse cx="52" cy="52" rx="30" ry="4" fill="rgba(0,0,0,0.08)"/>

          <!-- Tail -->
          <g class="tail">
            <path d="M18 30 Q8 22 11 13 Q13 8 18 12" stroke="#b5683a" stroke-width="5" stroke-linecap="round" fill="none"/>
          </g>

          <!-- Back legs -->
          <g class="leg leg-bl" style="transform-origin:28px 38px">
            <rect x="24" y="38" width="8" height="14" rx="4" fill="#a05830"/>
            <ellipse cx="28" cy="52" rx="5" ry="3" fill="#8a4820"/>
          </g>
          <g class="leg leg-br" style="transform-origin:36px 38px">
            <rect x="32" y="38" width="8" height="13" rx="4" fill="#a05830"/>
            <ellipse cx="36" cy="51" rx="5" ry="3" fill="#8a4820"/>
          </g>

          <!-- Body -->
          <ellipse cx="52" cy="34" rx="36" ry="15" fill="#c8844a"/>
          <!-- Belly -->
          <ellipse cx="52" cy="40" rx="28" ry="8" fill="#d9a070"/>

          <!-- Front legs -->
          <g class="leg leg-fl" style="transform-origin:68px 38px">
            <rect x="64" y="38" width="8" height="14" rx="4" fill="#a05830"/>
            <ellipse cx="68" cy="52" rx="5" ry="3" fill="#8a4820"/>
          </g>
          <g class="leg leg-fr" style="transform-origin:76px 38px">
            <rect x="72" y="37" width="8" height="13" rx="4" fill="#a05830"/>
            <ellipse cx="76" cy="50" rx="5" ry="3" fill="#8a4820"/>
          </g>

          <!-- Neck -->
          <ellipse cx="82" cy="28" rx="11" ry="10" fill="#c8844a"/>

          <!-- Head -->
          <ellipse cx="88" cy="20" rx="13" ry="11" fill="#c8844a"/>

          <!-- Ear (floppy) -->
          <g class="ear" style="transform-origin:82px 18px">
            <ellipse cx="80" cy="26" rx="7" ry="11" fill="#9a5828" transform="rotate(-10 80 26)"/>
          </g>

          <!-- Snout -->
          <ellipse cx="98" cy="24" rx="7" ry="5" fill="#b06838"/>
          <!-- Nose -->
          <ellipse cx="103" cy="23" rx="3" ry="2.2" fill="#2d1408"/>
          <!-- Nostril -->
          <ellipse cx="102" cy="24" rx="1" ry="0.8" fill="#1a0a04"/>

          <!-- Eye -->
          <circle cx="93" cy="17" r="3.5" fill="#fff"/>
          <circle cx="94" cy="17" r="2.2" fill="#2d1408"/>
          <circle cx="95" cy="16" r="0.8" fill="#fff"/>
          <!-- Eyebrow -->
          <path d="M90 13 Q93 11 96 13" stroke="#9a5828" stroke-width="1.5" stroke-linecap="round" fill="none"/>

          <!-- Collar -->
          <rect x="78" y="32" width="16" height="5" rx="2.5" fill="#e91e8c"/>
          <circle cx="86" cy="37" rx="2.2" ry="2.2" fill="#ffd700"/>

          <!-- Mouth / smile -->
          <path d="M98 27 Q100 29 102 27" stroke="#8a4820" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div class="dog-tap-hint">🐾 нажми!</div>
    </div>
  </div>
</div>

<!-- ══════════ SCREEN 2 ══════════ -->
<div class="screen" id="s2">
  <div class="card" style="padding-bottom:40px">
    <p class="s2-question">Давай сходим<br>на свидание? 👉👈<br><span style="font-size:1rem;font-weight:600;color:#c47090">(прям официально 😳)</span></p>
    <p class="s2-sub">это очень важный вопрос, всё серьёзно!!</p>
    <div class="answer-btns">
      <button class="answer-btn btn-yes" onclick="goTo('s3yes')">🥰 Давай!</button>
      <button class="answer-btn btn-no"  onclick="goTo('s3no')">Нет(</button>
    </div>
  </div>
</div>

<!-- ══════════ SCREEN 3 — YES ══════════ -->
<div class="screen" id="s3yes">
  <div class="card" style="padding-bottom:40px">
    <img src="photo.jpg" class="s3-photo" alt="это я" onerror="this.style.display='none'" />
    <p class="s3-yes-title">Вадим доволен 😌</p>
    <p class="s3-yes-sub">я уже очень рад 🥹<br>скоро напишу, договоримся!</p>
    <button class="confetti-btn" onclick="boom()">🎊 Нажми ещё раз!</button>
  </div>
</div>

<!-- ══════════ SCREEN 3 — NO ══════════ -->
<div class="screen" id="s3no">
  <div class="card" style="padding-bottom:40px">
    <span class="s3-no-dog">🐶</span>
    <p class="s3-no-title">ну и ладно... 😔</p>
    <p class="s3-no-sub">пёсик расстроился.<br>я тоже немного.</p>
    <button class="retry-btn" onclick="goTo('s2')">← подумать ещё раз?</button>
  </div>
</div>

<script>
  // Floating paws
  const pawsBg = document.getElementById('pawsBg');
  const pawEmojis = ['🐾','🌸','💕','✨','🐾','🌷'];
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'paw';
    p.textContent = pawEmojis[Math.floor(Math.random() * pawEmojis.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (10 + Math.random() * 14) + 's';
    p.style.animationDelay = (Math.random() * 14) + 's';
    p.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    pawsBg.appendChild(p);
  }

  function goTo(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 's3yes') setTimeout(boom, 300);
  }

  function boom() {
    const colors = ['#f875aa','#e91e8c','#ffd700','#ff6b9d','#fff','#c8845a'];
    for (let i = 0; i < 80; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.top = '-10px';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.width = (6 + Math.random() * 8) + 'px';
      c.style.height = (6 + Math.random() * 8) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      c.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }
</script>
</body>
</html>
